name: Django CI

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-test:
    name: Build, Test, Report Coverage
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.python-version == '3.9' || matrix.django-version >= '3' }}
    strategy:
      fail-fast: false
      matrix:
        python-version: [3.7, 3.8, 3.9]
        django-version: [2.2.0, 3.0.0, 3.1.0]

    services:
      postgres:
        # postgresql 10 with postgis 2.5
        image: postgis/postgis:10-2.5
        env:
          POSTGRES_PASSWORD: postgres_master
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2
        with:
          fetch-depth: 2

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v2
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v2
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements/dev.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
            ${{ runner.os }}-

      - name: Set up dependencies
        run: |
          sudo locale-gen eo
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements/dev.txt

      - name: Install latest patch of Django ${{ matrix.django-version }}
        # Install the latest patch version of Django.
        run: pip install -U Django~=${{ matrix.django-version }}

      - name: Lint
        run: |
          isort .
          flake8

      - name: Run tests
        env:
          DJANGO_SETTINGS_MODULE: pasportaservo.settings.testing
        run: coverage run ./manage.py test

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v1
        with:
          verbose: true
